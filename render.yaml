# Render.com deployment configuration
# Free tier available at https://render.com

services:
  - type: web
    name: sgm-drivers
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers=2 --bind=0.0.0.0:$PORT --timeout=120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///sgm_drivers.db
      - key: FLASK_ENV
        value: production
    healthCheckPath: /login
